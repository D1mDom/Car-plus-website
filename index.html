  <style>
    /* Initial load screen - shown until React mounts and replaces #root */
    #app-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      background: #ffffff;
      z-index: 9999;
    }
    #app-loader img {
      width: 120px;
      height: auto;
      animation: al-pulse 1.6s ease-in-out infinite;
    }
    #app-loader .al-ring {
      width: 40px;
      height: 40px;
      border: 4px solid #ffe4cc;
      border-top-color: #ff6d00;
      border-radius: 50%;
      animation: al-spin 0.8s linear infinite;
    }
    @keyframes al-spin { to { transform: rotate(360deg); } }
    @keyframes al-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
    @media (prefers-color-scheme: dark) {
      #app-loader { background: #0b1120; }
    }
  </style>
</head>

<body>
  <div id="root">
    <div id="app-loader">
      <img src="/logo.png" alt="Car Plus" />
      <div class="al-ring"></div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>
